services:
  postgres:
    image: postgres:18
    container_name: smart-class-postgres
    restart: always
    environment:
      POSTGRES_DB: smartclassdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smartclass-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: smart-class-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@smartclass.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./.docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./.docker/pgadmin/pgpass:/pgpass:ro
    networks:
      - smartclass-network

  ollama:
    image: ollama/ollama:latest
    container_name: smart-class-ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - smartclass-network
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Start Ollama in the background
        /bin/ollama serve &

        # Wait for Ollama to be ready
        until curl -s http://localhost:11434/api/tags > /dev/null 2>&1; do
          echo "Waiting for Ollama to start..."
          sleep 2
        done

        # Pull the model if not already present
        MODEL=$${OLLAMA_MODEL:-llama3.2}
        echo "Checking for $$MODEL model..."
        if ! /bin/ollama list | grep -q $$MODEL; then
          echo "Pulling $$MODEL model..."
          /bin/ollama pull $$MODEL
        else
          echo "$$MODEL model already exists"
        fi

        # Keep the container running
        wait
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    container_name: smart-class-nextjs
    restart: always
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/smartclassdb?schema=public
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@smartclass.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-secure@Password123}
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - NEXT_TELEMETRY_DISABLED=1
    ports:
      - "3000:3000"
    volumes:
      # Mount source code for hot reloading
      - .:/app
      # Exclude node_modules from being mounted
      - /app/node_modules
      - /app/.next
    command: sh -c "bun install && bun run db:generate && bun run db:push && bun run dev"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - smartclass-network
    stdin_open: true
    tty: true

networks:
  smartclass-network:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data:
  ollama_data:
